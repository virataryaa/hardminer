<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HardMiner</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a2463">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=SF+Pro+Display:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #fafafa;
  --surface:     #ffffff;
  --ink:         #1d1d1f;
  --ink-2:       #424245;
  --ink-3:       #6e6e73;
  --ink-4:       #aeaeb2;
  --border:      rgba(0,0,0,0.08);
  --border-mid:  rgba(0,0,0,0.12);
  --red:         #c0392b;
  --red-2:       #e74c3c;
  --ease:        cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --spring:      cubic-bezier(0.34, 1.56, 0.64, 1);
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  background: var(--bg);
  
  color: var(--ink);
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── Subtle noise ── */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.018; pointer-events:none; z-index:9999;
}

/* ════════════════════════════════════
   TOPBAR
════════════════════════════════════ */
.topbar {
  height: 52px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 2rem;
  background: rgba(250,250,250,0.82);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  opacity: 0;
  animation: fadeIn .5s var(--ease) .05s forwards;
}

.topbar-date {
  font-size: .65rem;
  font-weight: 400;
  letter-spacing: .06em;
  color: var(--ink-4);
}

.topbar-pill {
  display: flex; align-items: center; gap: 6px;
  font-size: .62rem;
  font-weight: 500;
  letter-spacing: .04em;
  color: var(--ink-3);
  background: var(--surface);
  border: 1px solid var(--border-mid);
  padding: 4px 11px;
  border-radius: 20px;
}

.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #30d158;
  animation: breathe 2.4s ease-in-out infinite;
}
@keyframes breathe {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.55;transform:scale(.8)}
}

/* ════════════════════════════════════
   HERO — THE HARDMINER
════════════════════════════════════ */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 7rem 2rem 5rem;
  text-align: center;
  opacity: 0;
  animation: heroIn .9s var(--ease) .15s forwards;
}

@keyframes heroIn {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

.hero-eyebrow {
  font-size: .62rem;
  font-weight: 500;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 1.4rem;
  opacity: 0;
  animation: fadeIn .6s var(--ease) .4s forwards;
}

.hero-title {
  font-family: 'Playfair Display', 'Georgia', serif;
  font-size: clamp(1.9rem, 4.5vw, 3.6rem);
  font-weight: 400;
  line-height: .95;
  letter-spacing: -.02em;
  color: #0a2463;
  margin-bottom: 1.2rem;
}
.hero-title em {
  font-style: italic;
  color: #c0392b;
  font-weight: 400;
}

.hero-rule {
  width: 40px; height: 1px;
  background: var(--ink-4);
  margin: 0 auto;
  opacity: 0;
  animation: fadeIn .6s var(--ease) .65s forwards;
}

@keyframes fadeIn {
  from{opacity:0} to{opacity:1}
}

/* ════════════════════════════════════
   TWO-COLUMN GRID
════════════════════════════════════ */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
  padding: 4rem 2rem 6rem;
  gap: 0;
  opacity: 0;
  animation: fadeIn .7s var(--ease) .55s forwards;
}

.col {
  padding: 0 3rem;
}
.col:first-child {
  border-right: 1px solid var(--border);
  padding-left: 0;
}
.col:last-child {
  padding-right: 0;
}

/* ── Column heading ── */
.col-heading {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-3);
  text-align: center;
  margin-bottom: 2rem;
  padding-bottom: .9rem;
  border-bottom: 1px solid var(--border);
}

/* ── Button group box (grey container) ── */
.btn-group-box {
  background: rgba(0,0,0,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 1rem;
}
.btn-group-box .row-btn:last-child {
  border-bottom: none;
}

/* ── Trade data section ── */
.trade-section {
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
  padding: 0 2rem 4rem;
}
.trade-section .col-heading {
  margin-bottom: 1rem;
}

/* ── Row button ── */
.row-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: .9rem 1rem;
  border: none;
  background: none;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  text-align: center;
  position: relative;
  transition: background .2s var(--ease);
}
.row-btn:hover { background: rgba(192,57,43,0.06); }
.row-btn:hover .rb-name { color: var(--red); }
.row-btn:hover .rb-sub  { color: var(--ink-3); }
.row-btn:hover .rb-arrow { opacity:1; transform:translateX(4px); color: var(--red); }

.rb-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  position: relative;
  z-index: 1;
  width: 100%;
}

.rb-text {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  flex: 1;
}

.rb-name {
  font-size: 1rem;
  font-weight: 400;
  color: var(--ink-2);
  letter-spacing: -.01em;
  line-height: 1;
  transition: color .2s;
}

.rb-sub {
  font-size: .58rem;
  font-weight: 400;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink-4);
  transition: color .2s;
}

.rb-arrow {
  font-size: .8rem;
  color: var(--ink-4);
  opacity: 0;
  transition: opacity .2s, transform .25s var(--ease), color .2s;
  position: absolute;
  right: 0;
}

/* ── Section sub-heading ── */
.section-sub {
  font-size: .55rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin: 0 0 .6rem 0;
}

/* ════════════════════════════════════
   FOOTER
════════════════════════════════════ */
footer {
  margin-top: auto;
  border-top: 1px solid var(--border);
  padding: 1.4rem;
  text-align: center;
  opacity: 0;
  animation: fadeIn .5s var(--ease) .85s forwards;
}
.footer-text {
  font-size: .58rem;
  font-weight: 400;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-4);
}

/* ════════════════════════════════════
   IFRAME VIEWER
════════════════════════════════════ */
.iframe-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 600;
  flex-direction: column;
  background: #fafafa;
}
.iframe-overlay.open { display: flex; }

.iframe-topbar {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.4rem;
  background: #0a2463;
  flex-shrink: 0;
}

.iframe-back {
  display: flex; align-items: center; gap: 7px;
  color: rgba(255,255,255,0.85);
  font-size: .72rem;
  font-weight: 500;
  letter-spacing: .05em;
  background: rgba(255,255,255,0.12);
  border: none;
  border-radius: 8px;
  padding: 5px 13px;
  cursor: pointer;
  transition: background .2s;
}
.iframe-back:hover { background: rgba(255,255,255,0.22); }

.iframe-title {
  font-size: .75rem;
  font-weight: 600;
  letter-spacing: .08em;
  color: rgba(255,255,255,0.9);
  text-transform: uppercase;
}

.iframe-open-ext {
  display: flex; align-items: center; gap: 5px;
  color: rgba(255,255,255,0.6);
  font-size: .65rem;
  text-decoration: none;
  letter-spacing: .04em;
  transition: color .2s;
}
.iframe-open-ext:hover { color: #fff; }

.iframe-frame {
  flex: 1;
  border: none;
  width: 100%;
}

/* ════════════════════════════════════
   MODAL
════════════════════════════════════ */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.overlay.open { display: flex; }

.modal {
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: min(440px, 92vw);
  padding: 2.6rem 2.8rem 2.2rem;
  position: relative;
  box-shadow: 0 32px 80px rgba(0,0,0,.12), 0 8px 20px rgba(0,0,0,.06);
  animation: modalIn .35s var(--spring) forwards;
}
@keyframes modalIn {
  from { opacity:0; transform:scale(.93) translateY(14px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.modal-close {
  position: absolute; top: 1.1rem; right: 1.3rem;
  width: 26px; height: 26px;
  background: rgba(0,0,0,.06);
  border: none; border-radius: 50%;
  font-size: .7rem;
  color: var(--ink-3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.modal-close:hover { background: rgba(0,0,0,.12); }

.modal-eyebrow {
  font-size: .55rem;
  font-weight: 600;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 6px;
}

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.9rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 1.8rem;
  line-height: 1.05;
  letter-spacing: -.01em;
}

.modal-list { display: flex; flex-direction: column; gap: 6px; }

.modal-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .78rem 1.1rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-decoration: none;
  cursor: pointer;
  transition: background .18s, border-color .18s, transform .2s var(--ease), box-shadow .2s;
}
.modal-item:hover {
  background: var(--red);
  border-color: var(--red);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(192,57,43,.22);
}
.modal-item:hover .mi-label { color: #fff; }
.modal-item:hover .mi-icon  { color: rgba(255,255,255,.7); }

.mi-label {
  font-size: .82rem;
  font-weight: 500;
  color: var(--ink-2);
  letter-spacing: -.01em;
  transition: color .18s;
}
.mi-icon {
  font-size: .75rem;
  color: var(--ink-4);
  transition: color .18s;
}
</style>
</head>

<!-- Password Gate -->
<div id="gate" style="
  position:fixed;inset:0;z-index:9998;
  background:#fafafa;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:1.4rem;
">
  <div style="font-family:'Playfair Display',Georgia,serif;font-size:2rem;font-weight:400;color:#0a2463;letter-spacing:-.02em;">
    Hard<em style="font-style:italic;color:#c0392b;">Miner</em>
  </div>
  <div style="font-size:.58rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:#aeaeb2;">
    Internal Access Only
  </div>
  <div style="display:flex;flex-direction:column;gap:.6rem;width:min(320px,88vw)">
    <input id="gate-input" type="password" placeholder="Enter password"
      style="
        width:100%;padding:.85rem 1.1rem;
        border:1px solid rgba(0,0,0,0.12);border-radius:10px;
        background:#fff;font-size:.9rem;color:#1d1d1f;
        outline:none;transition:border-color .2s;
        font-family:-apple-system,'Helvetica Neue',sans-serif;
      "
      onfocus="this.style.borderColor='#c0392b'"
      onblur="this.style.borderColor='rgba(0,0,0,0.12)'"
      onkeydown="if(event.key==='Enter')checkPass()"
    />
    <button onclick="checkPass()" style="
      width:100%;padding:.85rem;border:none;border-radius:10px;
      background:#c0392b;color:#fff;font-size:.82rem;font-weight:600;
      letter-spacing:.04em;cursor:pointer;transition:background .2s;
      font-family:-apple-system,'Helvetica Neue',sans-serif;
    "
      onmouseover="this.style.background='#a93226'"
      onmouseout="this.style.background='#c0392b'"
    >Enter</button>
    <div id="gate-err" style="font-size:.68rem;color:#c0392b;text-align:center;min-height:1em;letter-spacing:.04em;"></div>
  </div>
</div>

<script>
  (function(){
    if(sessionStorage.getItem('hm_auth')==='1'){
      document.getElementById('gate').style.display='none';
    }
  })();
  function checkPass(){
    var v=document.getElementById('gate-input').value;
    if(v==='852046'){
      sessionStorage.setItem('hm_auth','1');
      var g=document.getElementById('gate');
      g.style.transition='opacity .4s';g.style.opacity='0';
      setTimeout(function(){g.style.display='none';},400);
    } else {
      var e=document.getElementById('gate-err');
      e.textContent='Incorrect password. Try again.';
      document.getElementById('gate-input').value='';
      document.getElementById('gate-input').focus();
    }
  }
</script>

<script>
  // Date
  document.getElementById('live-date').textContent =
    new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // Link registry — replace null with Streamlit URLs as you build them
  const LINKS = {
    fundamentals: {
      'Coffee':       {'TDM Trade Flows':'iframe:TDM Trade Flows:https://coffeeexportertdm-a4vbj7jhz3cllqvhaz4nsi.streamlit.app/','Currency Dashboard':'https://currencydashboard-6czutxwm5ume5rzndcs9k5.streamlit.app/','Tender Parity':'iframe:Tender Parity:https://tender-parity-bww8jqzb4ozdlczphsha4k.streamlit.app/','Supply & Demand':'coming-soon.html','Production / Crop':'coming-soon.html','Stocks / Inventories':'coming-soon.html'},
      'Cocoa':        {'TDM Trade Flows':'https://cocoa-tradeflows-3rfkxpn5osmtg6cb4uqxbs.streamlit.app/','Currency Dashboard':'https://currencydashboard-6czutxwm5ume5rzndcs9k5.streamlit.app/','Supply & Demand':'coming-soon.html','Production / Crop':'coming-soon.html','Stocks / Inventories':'coming-soon.html'},
      'Sugar':        {'Trade Flows':'https://sugar-tradeflows-8y8mt7mrj9qr5znqftk7gm.streamlit.app/','Supply & Demand':'coming-soon.html','Production / Crop':'coming-soon.html','Stocks / Inventories':'coming-soon.html'},
      'Cotton':       {'Trade Flows':'https://cotton-tradeflows-new-ssrhhoiqnw2okz5zqkwvq6.streamlit.app/','Supply & Demand':'coming-soon.html','Production / Crop':'coming-soon.html','Stocks / Inventories':'coming-soon.html'},
      'Orange Juice': {'Trade Flows':'coming-soon.html','Supply & Demand':'coming-soon.html','Production / Crop':'coming-soon.html','Stocks / Inventories':'coming-soon.html'},
    },
    tradeflows: {
      'Trade Flows': {
        'Coffee':  'https://coffeeexportertdm-a4vbj7jhz3cllqvhaz4nsi.streamlit.app/',
        'Cocoa':   'https://cocoa-tradeflows-3rfkxpn5osmtg6cb4uqxbs.streamlit.app/',
        'Sugar':   'https://sugar-tradeflows-8y8mt7mrj9qr5znqftk7gm.streamlit.app/',
        'Cotton':  'https://cotton-tradeflows-new-ssrhhoiqnw2okz5zqkwvq6.streamlit.app/',
      },
    },
    weather: {
      'Weather': {
        'Coffee': 'https://weather-new-3vkh3k8cfyoyodhspwhmur.streamlit.app/',
        'Cocoa':  'https://cocoa-weather-asmewzdyvp6xqoijmneuyz.streamlit.app/',
        'Sugar':  'coming-soon.html',
      },
    },
    'non-fundamentals': {
      'Rollex':          {'Open Dashboard':'https://rollex-new-lapprpu45ysmmiycckod3oj.streamlit.app/'},
      'COT Analysis':    {'COT Dashboard':'https://cot-view-zzrtspxyqdfvfnkbmsqpmm.streamlit.app/','Pain Trade Monitor':'https://cot-view-fyqtkmawtaayrknnynq4fq.streamlit.app/','COT Prediction':'coming-soon.html','Spec Proximity Dashboard':'coming-soon.html'},
      'Seasonality':     {'Coffee':'coming-soon.html','Cocoa':'coming-soon.html','Sugar':'coming-soon.html','All Commodities':'coming-soon.html'},
      'Roll Yield':      {'Roll Yield Monitor':'https://roll-yield-ofghtdpvrca3nmdcgjma8y.streamlit.app/','Initial Margin':'coming-soon.html'},

      'VaR':             {'VaR Monitor':'popup:https://rollex-new-36wuipyryfhfa2fusl3apt.streamlit.app/','Initial Margin':'coming-soon.html','Spec in VaR':'coming-soon.html'},
      'Optimus Prime':   {'Backtesting Engine':'coming-soon.html','Statistics':'https://www.notion.so/Optimus-Prime-Statistics-333fbb7607b880ee8876cdfe10893956?source=copy_link','Strategy':'coming-soon.html'},
    }
  };

  function openModal(name, type) {
    const eyebrowMap = { fundamentals: 'Fundamentals', 'non-fundamentals': 'Non-Fundamentals', tradeflows: 'Trade Data', weather: 'Weather' };
    document.getElementById('m-eyebrow').textContent = eyebrowMap[type] || '';
    document.getElementById('m-title').textContent = name;

    const list = document.getElementById('m-list');
    list.innerHTML = '';

    const sections = LINKS[type][name] || {};
    Object.entries(sections).forEach(([label, url]) => {
      const a = document.createElement('a');
      a.className = 'modal-item';
      const isIframe = url && url.startsWith('iframe:');
      const isExternal = !isIframe && url && url.startsWith('http');

      if (isIframe) {
        const parts = url.split(':');
        const iframeTitle = parts[1];
        const iframeUrl = parts.slice(2).join(':');
        a.href = '#';
        a.addEventListener('click', e => { e.preventDefault(); openIframe(iframeTitle, iframeUrl); });
        a.innerHTML = `<span class="mi-label">${label}</span><span class="mi-icon">&#9654;</span>`;
      } else if (url && url.startsWith('popup:')) {
        const popupUrl = url.slice(6);
        a.href = '#';
        a.addEventListener('click', e => {
          e.preventDefault();
          const w = screen.width, h = screen.height;
          window.open(popupUrl, '_blank', `width=${w},height=${h},left=0,top=0,menubar=no,toolbar=no,location=no,status=no`);
        });
        a.innerHTML = `<span class="mi-label">${label}</span><span class="mi-icon">&#9654;</span>`;
      } else {
        a.href = url || '#';
        if (isExternal) { a.target = '_blank'; a.rel = 'noopener'; }
        if (!url) a.addEventListener('click', e => e.preventDefault());
        a.innerHTML = `<span class="mi-label">${label}</span><span class="mi-icon">${isExternal ? '↗' : '→'}</span>`;
      }
      list.appendChild(a);
    });

    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeOutside(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeIframe(); } });

  function openIframe(title, url) {
    document.getElementById('iframe-title').textContent = title;
    document.getElementById('iframe-frame').src = url;
    document.getElementById('iframe-ext-link').href = url;
    document.getElementById('iframe-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    closeModal();
  }

  function closeIframe() {
    document.getElementById('iframe-overlay').classList.remove('open');
    document.getElementById('iframe-frame').src = '';
    document.body.style.overflow = '';
  }

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
