<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon — The HardMiner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #fafafa;
  --ink:   #1d1d1f;
  --ink-3: #6e6e73;
  --ink-4: #aeaeb2;
  --red:   #c0392b;
  --border: rgba(0,0,0,0.08);
  --ease:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  overflow: hidden;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: .018; pointer-events: none; z-index: 9999;
}

.wrap {
  opacity: 0;
  animation: fadeUp .8s var(--ease) .1s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.eyebrow {
  font-size: .6rem;
  font-weight: 600;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 1.4rem;
}

.title {
  font-family: 'Playfair Display', 'Georgia', serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  font-weight: 400;
  line-height: .95;
  letter-spacing: -.02em;
  color: var(--ink);
  margin-bottom: .6rem;
}

.title em {
  font-style: italic;
  color: var(--red);
}

.sub {
  font-size: .78rem;
  font-weight: 400;
  color: var(--ink-4);
  letter-spacing: .04em;
  margin-bottom: 3rem;
}

.rule {
  width: 36px; height: 1px;
  background: var(--ink-4);
  margin: 0 auto 3rem;
}

.home-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: .72rem;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink-3);
  text-decoration: none;
  border: 1px solid var(--border);
  background: #fff;
  padding: .75rem 1.6rem;
  border-radius: 30px;
  transition: background .2s var(--ease), color .2s, border-color .2s, box-shadow .2s;
}

.home-btn:hover {
  background: var(--red);
  border-color: var(--red);
  color: #fff;
  box-shadow: 0 6px 20px rgba(192,57,43,.2);
}

.home-btn svg {
  width: 12px; height: 12px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform .2s var(--ease);
}

.home-btn:hover svg { transform: translateX(-2px); }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">ETG Softs &amp; Ags</div>
  <h1 class="title">Coming<br><em>Soon</em></h1>
  <p class="sub">This module is under construction.</p>
  <div class="rule"></div>
  <a href="index.html" class="home-btn">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to HardMiner
  </a>
</div>

</body>
</html>
